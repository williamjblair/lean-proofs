name = "lean-proofs"
version = "0.1.0"
keywords = ["math", "formal-proofs", "erdos"]
defaultTargets = ["ErdosProblems", "Erdos699"]
weakLeanArgs = ["-s", "65520"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "PrimeNumberTheoremAnd"
git = "https://github.com/AlexKontorovich/PrimeNumberTheoremAnd.git"
rev = "d7f9e2bfdcc7e34dfb9328b7494a6d424ff50c96"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.29.1"

[[lean_lib]]
name = "ErdosProblems"

[[lean_lib]]
name = "Erdos699"
srcDir = "lean"
