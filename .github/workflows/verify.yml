name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Every push builds the whole library and checks the manifest.  The build is
# matrixed one job per problem subtree (scripts/build-targets.json) because the
# library is too large for a single runner to compile at once.  The axiom audit,
# which needs the whole library built and co-located, runs nightly (audit.yml).
jobs:
  targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          echo "matrix=$(jq -c '{target: .}' scripts/build-targets.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: targets
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.targets.outputs.matrix) }}
    runs-on: ubuntu-latest
    name: build ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      # Installs elan from lean-toolchain, restores the Mathlib cache, then
      # `lake build <target>` for this subtree only.
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build-args: ${{ matrix.target }}

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No literal sorry / admit in the hosted proofs
        run: |
          if grep -rnoE '\b(sorry|admit)\b' ErdosProblems ; then
            echo "FAIL: literal sorry/admit above" >&2 ; exit 1
          fi
      - name: proofs.yaml and Audit.lean agree on the tracked theorem set
        run: bash scripts/check_manifest.sh
      - name: Aggregates and build targets are up to date
        run: |
          python3 scripts/gen_aggregates.py
          git diff --exit-code -- ErdosProblems.lean scripts/build-targets.json \
            'ErdosProblems/**/All.lean' 'ErdosProblems/**/Loose.lean'
