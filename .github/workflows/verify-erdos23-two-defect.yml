name: verify-erdos23-two-defect

on:
  pull_request:
    paths:
      - 'ErdosProblems/Erdos23GapGBTwoDefectFinal.lean'
      - '.github/workflows/verify-erdos23-two-defect.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check-two-defect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Compile two-defect final module
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          lake build ErdosProblems.Erdos23GapGBTwoDefectFinal > /tmp/two-defect.log 2>&1
          status=$?
          cat /tmp/two-defect.log
          if [ "$status" -ne 0 ] && [ -n "$PR_NUMBER" ]; then
            {
              echo '### Targeted Lean compiler output'
              echo
              echo '```text'
              tail -n 180 /tmp/two-defect.log
              echo '```'
            } > /tmp/two-defect-comment.md
            gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body-file /tmp/two-defect-comment.md
          fi
          exit "$status"
